# mini-proxy 配置文件
# 首次运行时自动生成，请填写真实配置后重新启动
# 所有以 # 开头的行是注释，不影响运行

[server]
# 本地监听地址，客户端访问此端口
listen = "127.0.0.1:8787"

[log]
# 日志级别：trace | debug | info | warn | error
level = "info"
# 输出格式：pretty（彩色） | json
format = "pretty"
# 是否输出到 stdout
to_stdout = true
# 文件输出路径，留空则不写文件
to_file = "logs/proxy.log"
# 单文件大小上限（MB），超过则滚动
rotate_size_mb = 50
# 保留历史文件数量
rotate_keep = 7

# ┌─────────────────────────────────────────────────────────────┐
# │ 示例配置（参考用，取消下面的注释并按需修改）                  │
# └─────────────────────────────────────────────────────────────┘
#
# provider 级字段（api_key/models/model_map/max_retries 等）可被两种协议共用
# endpoint 级（[provider.openai] / [provider.claude]）同名字段覆盖 provider 级
#
# [[provider]]
# name = "xfyun-main"
# # 以下字段写在 provider 级时，openai 和 claude 两个 endpoint 共用
# api_key = "请填写真实 api_key"
# models = ["xopglm52", "xopglm51", "xopdeepseekv4pro", "xopkimik26"]
# # 模型 ID 映射：客户端模型名 → 上游模型名，未配置则同名透传
# # TOML 支持带引号的字符串键
# [provider.model_map]
# "client-gpt4" = "xopglm52"
# "client-claude" = "xopglm51"
# max_retries = 100
# # retry_on_status 留空则使用默认范围（参考 new-api）
# # 永远不重试 504 和 524
# retry_on_status = []
# # key_mode = "override"（默认）：用 config 的 api_key 覆盖客户端 Key
# # key_mode = "passthrough"：保留客户端原 Key，config 不存储不管理
# key_mode = "override"
#
# [provider.openai]
# # OpenAI 协议
# # path_mode = "append"（默认）：上游 URL = base_url + /chat/completions
# # path_mode = "full"：base_url 原样使用，不补路径
# base_url = "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
# # api_key/max_retries 等未写则继承 provider 级
#
# [provider.claude]
# # Claude 协议
# base_url = "https://maas-coding-api.cn-huabei-1.xf-yun.com/anthropic"
# # 若两种协议的 api_key 不同，可在此覆盖
# # api_key = "claude-专用-key"
