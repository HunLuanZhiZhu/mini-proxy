# mini-proxy 配置文件
# 首次运行时自动生成，请填写真实配置后重新启动
# 所有以 # 开头的行是注释，不影响运行

[server]
# 本地监听地址，客户端访问此端口
listen = "127.0.0.1:7946"

[log]
# 日志级别：trace | debug | info | warn | error
level = "info"
# 输出格式：pretty（彩色） | json
format = "pretty"
# 是否输出到 stdout
to_stdout = true
# 文件输出路径，留空则不写文件
to_file = "logs/proxy.log"
# 单文件大小上限（MB），超过则滚动
rotate_size_mb = 50
# 保留历史文件数量
rotate_keep = 7

# ┌─────────────────────────────────────────────────────────────┐
# │ 对外服务端点                                                │
# └─────────────────────────────────────────────────────────────┘
# 客户端访问以下两个路径，分别对应两种协议：
#   OpenAI 协议：  POST /chat/completions   （或带任意前缀如 /v1/chat/completions）
#   Claude 协议： POST /messages            （或带任意前缀如 /v1/messages）
# 路径只看后缀，前缀随意。客户端无需 API Key（由 config 注入或透传）。

# ┌─────────────────────────────────────────────────────────────┐
# │ 示例配置（参考用，取消下面的注释并按需修改）                  │
# └─────────────────────────────────────────────────────────────┘
#
# provider 级字段可被两种协议共用，endpoint 级（.openai / .claude）同名字段覆盖之

[[provider]]
name = "xfyun-main"
# 以下字段写在 provider 级时，openai 和 claude 两个 endpoint 共用
api_key = "6598d91da17d77b3112ba285e4f1fa05:NTJjZmZmN2I3ZjJkZTE1MzNmYWI3NDZi"
models = ["xopglm52", "xopglm51", "xopdeepseekv4pro", "xopkimik26"]
# 同渠道同模型最大重试次数（总尝试 = max_retries + 1）
max_retries = 100
# 触发重试的状态码：支持单值 429 或范围字符串 "500-504"
# 留空则使用默认范围（参考 new-api：100-199,300-399,401-407,409-499,500-503,505-523,525-599）
# 永远不重试 504 和 524
retry_on_status = ["100-199", "300-399", "401-407", "409-499", "500-503", "505-523", "525-599"]
# key_mode = "override"（默认）：用 config 的 api_key 覆盖客户端 Key
# key_mode = "passthrough"：保留客户端原 Key，config 不存储不管理
key_mode = "override"
# 模型 ID 映射：客户端模型名 → 上游模型名，未配置则同名透传（通常不需要，默认即可）
# TOML 支持带引号的字符串键
## [provider.model_map]
## "client-gpt4" = "xopglm52"
## "client-claude" = "xopglm51"

[provider.openai]
# OpenAI 协议（仅 base_url 与 claude 不同，其他字段继承 provider 级）
# path_mode = "append"（默认）：上游 URL = base_url + /chat/completions
# path_mode = "full"：base_url 原样使用，不补路径
base_url = "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
# 如需覆盖 provider 级字段，在此填写即可，例如：
# api_key = "openai-专用-key"
# max_retries = 50

[provider.claude]
# Claude 协议（仅 base_url 与 openai 不同，其他字段继承 provider 级）
base_url = "https://maas-coding-api.cn-huabei-1.xf-yun.com/anthropic"
# 同样可在此覆盖 provider 级任意字段
