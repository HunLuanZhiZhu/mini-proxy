# 示例配置文件，复制为 config.toml 后修改使用

[server]
# 本地监听地址，客户端直接访问此端口，无需 API Key
listen = "127.0.0.1:8787"

[log]
# 日志级别：trace | debug | info | warn | error
level = "info"
# 输出格式：pretty（彩色） | json
format = "pretty"
# 是否输出到 stdout
to_stdout = true
# 文件输出路径，留空则不写文件
to_file = "logs/proxy.log"
# 单文件大小上限（MB），超过则滚动
rotate_size_mb = 50
# 保留历史文件数量
rotate_keep = 7

# 一个 provider 可同时承载两种协议（openai + claude），各有独立配置
# 也可只配其中一种

[[provider]]
name = "openai-main"

[provider.openai]
# OpenAI 协议 base_url
# path_mode = "append"（默认）：上游 URL = base_url + /chat/completions
#   例：https://api.openai.com/v1/chat/completions
# path_mode = "full"：base_url 原样使用，不补路径
base_url = "https://api.openai.com/v1"
api_key = "sk-xxx"
models = ["gpt-4o", "gpt-4o-mini"]
# 触发重试的状态码：支持单值 429 或范围字符串 "500-504"
retry_on_status = [429, "500-504"]
# 同渠道同模型最大重试次数（总尝试 = max_retries + 1）
max_retries = 3

[[provider]]
name = "claude-direct"

[provider.claude]
base_url = "https://api.anthropic.com"
api_key = "sk-ant-xxx"
models = ["claude-3-5-sonnet-20241022", "claude-3-5-haiku-20241022"]
retry_on_status = [429, "500-504", 529]
max_retries = 2

